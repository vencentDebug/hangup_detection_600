global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI 指标（需在 serve.py 中集成 prometheus_fastapi_instrumentator）
  - job_name: hangup_api
    static_configs:
      - targets: ["hangup-api:8000"]
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ["nginx:9113"]   # 如使用 nginx-prometheus-exporter
