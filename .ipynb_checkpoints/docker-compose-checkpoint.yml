# version: "3.11"

# ══════════════════════════════════════════════
# 挂断检测完整部署栈
#   - hangup-api    : FastAPI 推理服务
#   - nginx         : 反向代理 / 限流
#   - loki          : 日志聚合
#   - promtail      : 日志采集
#   - prometheus    : 指标采集
#   - grafana       : 可视化面板
# ══════════════════════════════════════════════

services:

  # ──────────────────────────────────────────
  # 推理服务
  # ──────────────────────────────────────────
  hangup-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hangup-detection:latest
    container_name: hangup-api
    restart: unless-stopped
    environment:
      MODEL_DIR: /app/model
      LOG_DIR: /app/logs
      MAX_LENGTH: "64"
      THRESHOLD: "0.5"
    volumes:
      # 挂载本地模型目录（只读）
      - ./output/fine_tuned_hangup:/app/model:ro
      # 日志持久化
      - hangup_logs:/app/logs
    ports:
      - "38040:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - hangup_net
    deploy:
      resources:
        limits:
          memory: 2G

